name: Deploy hotely-homepage to GitHub Pages

on:
  push:
    branches:
      - claude/hotely-homepage-build-h5Jdg
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hotely-homepage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hotely-homepage/package-lock.json

      - run: npm ci

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /GLGresearch
        run: |
          npm run build
          touch out/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: hotely-homepage/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
